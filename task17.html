<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <body>
        <script type="text/javascript">
            var total;
            total = 0;
            var counter;
            counter = 0;
            var n;
            n = 0;
            while (counter <10) {
                n = prompt("enter a number : ");
                total = total + parseInt(n);
                counter += 1;
            }
            console.log("total : " + total);
        </script>
    </body>
</html>
