<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <body>
        <script type="text/javascript">
            var array_fruits;
            var n;
            array_fruits = [];
            n = prompt("Fruit : ")
            for(var i = 0; n !== "stop"; i++){
                array_fruits[i] = n;
                n = prompt("Fruit : ")
            }
            console.log(array_fruits);
            
        </script>
    </body>
</html>
