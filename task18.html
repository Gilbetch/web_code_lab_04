<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <body>
        <script type="text/javascript">
            var total;
            total = 0;
            var n;
            n = 0;
            while (n != -1) {
                total = total + parseInt(n);
                n = prompt("enter a number : ");
            }
            console.log("total : " + total);
        </script>
    </body>
</html>
