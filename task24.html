<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <body>
        <script type="text/javascript">
            var bot;
            var bot_point = 0;
            var user_point = 0;
            var user;
            for (var counter = 0; counter < 3; counter++) {
                bot = Math.floor(Math.random() * 3) + 1;
                user = prompt("batu/kertas/gunting : ");
                if (bot == 1) {
                    bot = "batu";
                } else if (bot == 2) {
                    bot = "kertas";
                } else {
                    bot = "gunting";
                }
                if (user == bot) {
                    console.log("Draw");
                } else if ((user == "batu" && bot == "gunting") || (user == "kertas" && bot == "batu") || (user == "gunting" && bot == "kertas")) {
                    console.log("User Wins");
                    user_point++;
                } else {
                    console.log("Computer Wins");
                    bot_point++;
                }
                    
            }
            if (user_point > bot_point) {
                console.log("User wins the game!");
            } else if (bot_point > user_point) {
                console.log("Computer wins the game!");
            } else {
                console.log("Draw!");
            }
        </script>
    </body>
</html>
