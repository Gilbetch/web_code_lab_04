        <script>

            var angka1 = Math.floor(Math.random() * 10);
            var angka2 = Math.floor(Math.random() * 10);

            foto2.src = foto_Angka[angka2];

            if (operator == 0){
                document.getElementById('operator').innerText = "+";

            var jawaban = angka_Array[angka1] + angka_Array[angka2] + soperator;
